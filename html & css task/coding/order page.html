<!DOCTYPE html>
<html>
<head>
    <title>Buy Now</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#f2f2f2;
        }

        .box{
            width:400px;
            background:white;
            margin:80px auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid gray;
            border-radius:5px;
        }

        button{
            width:100%;
            background:orange;
            color:white;
            border:none;
            padding:12px;
            font-size:18px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#ff6600;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>Buy Product</h1>

    <form>
        <input type="text" placeholder="Enter Name">

        <input type="email" placeholder="Enter Email">

        <input type="text" placeholder="Enter Address">

        <button>Place Order</button>
    </form>

</div>

</body>
</html>
